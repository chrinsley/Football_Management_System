services:

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend


  backend:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - database


  database:
    image: postgres:16
    environment:
      POSTGRES_DB: football
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"